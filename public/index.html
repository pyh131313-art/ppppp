<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>礦井探險 Web 面板</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero game-topbar">
        <div>
          <p class="eyebrow">Discord 即時同步</p>
          <h1>礦井探險</h1>
          <p class="sub">挖礦、養雞、收藏與排行榜都在同一個冒險面板。</p>
        </div>
        <div class="hero-actions">
          <button class="button ghost hidden" id="refreshButton">刷新資料</button>
          <a class="button primary" href="/login" id="loginButton">Discord 登入</a>
          <button class="button ghost hidden" id="logoutButton">登出</button>
        </div>
      </section>

      <section class="notice hidden" id="notice"></section>

      <section class="dashboard hidden" id="dashboard">
        <nav class="tabs" aria-label="面板分頁">
          <button class="tab active" data-tab="overview">總覽</button>
          <button class="tab" data-tab="bag">包包</button>
          <button class="tab" data-tab="chicken">雞舍</button>
          <button class="tab" data-tab="collection">集幣冊</button>
          <button class="tab" data-tab="leaderboard">排行榜</button>
          <span class="last-updated" id="lastUpdated">-</span>
        </nav>

        <aside class="profile panel">
          <div class="user-row">
            <img class="avatar" id="avatar" alt="">
            <div>
              <p class="muted">玩家</p>
              <h2 id="playerName">-</h2>
            </div>
          </div>
          <div class="stats-grid">
            <div><span>金幣</span><strong id="gold">0</strong></div>
            <div><span>銀行</span><strong id="bankGold">0</strong></div>
            <div><span>總資產</span><strong id="totalAsset">0</strong></div>
            <div><span>生命</span><strong id="hp">0/0</strong></div>
          </div>
        </aside>

        <section class="panel mine-panel tab-page" data-page="overview">
          <div class="mine-screen" id="mineScreen">
            <div class="scene-topline">
              <span id="sceneArea">普通礦洞</span>
              <strong id="sceneDepth">0 層</strong>
            </div>
            <div class="mine-art" id="mineArt" aria-hidden="true"></div>
            <div class="route-strip" id="routeStrip"></div>
          </div>
        </section>

        <section class="panel status-panel tab-page" data-page="overview">
          <div class="section-title">
            <span>⛏️</span>
            <h2>礦場狀態</h2>
          </div>
          <div class="status-list">
            <div><span>區域</span><strong id="area">-</strong></div>
            <div><span>洞窟</span><strong id="cave">-</strong></div>
            <div><span>深度</span><strong id="depth">-</strong></div>
            <div><span>最深</span><strong id="bestDepth">-</strong></div>
            <div><span>詞條</span><strong id="runMode">-</strong></div>
            <div><span>挑戰紀錄</span><strong id="challengeBest">-</strong></div>
          </div>
        </section>

        <section class="panel action-panel tab-page" data-page="overview">
          <div class="section-title">
            <span>🎮</span>
            <h2>操作</h2>
          </div>
          <div class="action-message hidden" id="actionMessage"></div>
          <div class="trait-picker hidden" id="traitPicker"></div>
          <div class="action-grid" id="actionGrid"></div>
        </section>

        <section class="panel bag-panel tab-page" data-page="bag">
          <div class="section-title">
            <span>🎒</span>
            <h2>包包</h2>
            <small id="bagCount">0/0</small>
          </div>
          <div class="inventory-grid" id="inventoryGrid"></div>
        </section>

        <section class="panel chicken-panel tab-page" data-page="chicken">
          <div class="section-title">
            <span>🐔</span>
            <h2>雞舍</h2>
          </div>
          <div id="chickenCard" class="chicken-card"></div>
        </section>

        <section class="panel collection-panel tab-page" data-page="collection">
          <div class="section-title">
            <span>🪙</span>
            <h2>集幣冊</h2>
            <small id="collectionCount">0</small>
          </div>
          <div class="toolbar">
            <button class="chip active" data-collection-filter="all">全部</button>
            <button class="chip" data-collection-filter="owned">已擁有</button>
            <button class="chip" data-collection-filter="missing">未取得</button>
          </div>
          <div class="coin-grid" id="coinGrid"></div>
        </section>

        <section class="panel leaderboard-panel tab-page" data-page="leaderboard">
          <div class="section-title">
            <span>🏆</span>
            <h2>排行榜</h2>
          </div>
          <div class="leaderboard-grid">
            <article>
              <h3>最深礦坑</h3>
              <ol id="depthBoard"></ol>
            </article>
            <article>
              <h3>挑戰模式</h3>
              <ol id="challengeBoard"></ol>
            </article>
            <article>
              <h3>總資產</h3>
              <ol id="assetBoard"></ol>
            </article>
            <article>
              <h3>賽雞勝場</h3>
              <ol id="chickenBoard"></ol>
            </article>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
