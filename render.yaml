services:
  - type: web
    name: mining-discord-game
    runtime: node
    plan: starter
    region: singapore
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        value: https://mining-discord-game.onrender.com/auth/discord/callback
      - key: WEB_PUBLIC_BASE_URL
        value: https://mining-discord-game.onrender.com
      - key: WEB_SESSION_SECRET
        generateValue: true
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_GUILD_IDS
        sync: false
      - key: DATA_FILE
        value: /var/data/players.json
      - key: DATABASE_FILE
        value: /var/data/players.sqlite
    disk:
      name: game-data
      mountPath: /var/data
      sizeGB: 1
